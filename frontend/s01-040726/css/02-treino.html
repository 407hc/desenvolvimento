<!doctype html>
<html>
    <head>
        <title>The Red Panda</title>
        <link rel="stylesheet" href="css/02-treino.css" />
    </head>
    <body>
        <h2>The Red Panda</h2>
        <p>
            The Red Panda is a cat-size mammal originally from southwestern
            China. It has reddish-brown fur and a long, bushy tail. Red pandas
            primarily eat bamboo, but are considered carnivorous as they also
            eat eggs, birds, and insects.
        </p>
        <span>Other names: Fire Fox, Red Bear-Cat</span>
    </body>
</html>
